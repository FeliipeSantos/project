version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fincontrol-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fincontrol
      POSTGRES_USER: fincontrol_user
      POSTGRES_PASSWORD: fincontrol_secure_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fincontrol-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincontrol_user -d fincontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fincontrol-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_secure_pass_2026
    volumes:
      - redis_data:/data
    networks:
      - fincontrol-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_pass_2026", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend & Frontend will be enabled later as we build them, or we can configure them now for future docker-compose up
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincontrol-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://fincontrol_user:fincontrol_secure_pass_2026@postgres:5432/fincontrol
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_secure_pass_2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fincontrol-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fincontrol-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fincontrol-network

volumes:
  postgres_data:
  redis_data:

networks:
  fincontrol-network:
    driver: bridge
